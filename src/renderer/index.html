<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Session Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      width: 100%; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: transparent;
      color: #e0e0e0;
      overflow: hidden;
    }

    /* Splash screen — visible before React mounts.
       Theme follows OS appearance via prefers-color-scheme since the user's
       in-app preference isn't available until React loads (~1-2s). */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: rgba(18, 18, 22, 0.95);
      backdrop-filter: blur(40px);
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Claude mascot */
    .splash-logo {
      position: relative;
      width: 80px;
      height: 80px;
      animation: splash-float 2.5s ease-in-out infinite;
    }
    .splash-logo svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 24px rgba(217, 119, 87, 0.35));
    }

    @keyframes splash-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* Spinner ring */
    .splash-spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(255, 255, 255, 0.08);
      border-top-color: #D97757;
      border-radius: 50%;
      animation: splash-spin 0.9s linear infinite;
    }
    @keyframes splash-spin {
      to { transform: rotate(360deg); }
    }

    .splash-title {
      font-size: 15px;
      font-weight: 600;
      color: rgba(240, 240, 245, 0.85);
      letter-spacing: 0.3px;
    }
    .splash-subtitle {
      font-size: 11px;
      color: rgba(160, 160, 176, 0.6);
      margin-top: -14px;
    }

    /* Light theme follows OS appearance.
       The renderer also adds .theme-light to <html> once settings load,
       so the user's manual preference takes precedence after first paint. */
    @media (prefers-color-scheme: light) {
      html, body, #root { color: #1a1a2e; }
      #splash { background: rgba(245, 245, 250, 0.97); }
      .splash-spinner { border-color: rgba(0, 0, 0, 0.08); }
      .splash-title { color: rgba(26, 26, 46, 0.85); }
      .splash-subtitle { color: rgba(80, 80, 96, 0.6); }
    }
    html.theme-light, html.theme-light body, html.theme-light #root { color: #1a1a2e; }
    html.theme-light #splash { background: rgba(245, 245, 250, 0.97); }
    html.theme-light .splash-spinner { border-color: rgba(0, 0, 0, 0.08); }
    html.theme-light .splash-title { color: rgba(26, 26, 46, 0.85); }
    html.theme-light .splash-subtitle { color: rgba(80, 80, 96, 0.6); }
    html.theme-dark #splash { background: rgba(18, 18, 22, 0.95); }
  </style>
  <script>
    // Apply the user's saved theme preference instantly so the splash
    // matches their app theme. Falls back to OS appearance on first launch.
    try {
      var savedTheme = localStorage.getItem('app-theme');
      if (savedTheme === 'light' || savedTheme === 'dark') {
        document.documentElement.classList.add('theme-' + savedTheme);
      }
    } catch (e) {}
  </script>
</head>
<body>
  <!-- Splash screen (pure HTML, no JS dependency) -->
  <div id="splash">
    <div class="splash-logo">
      <img src="assets/mascotte_claude.png" alt="Claude" width="80" height="80" />
    </div>
    <span class="splash-title">Claude Session Manager</span>
    <span class="splash-subtitle">Loading sessions...</span>
    <div class="splash-spinner"></div>
  </div>

  <div id="root"></div>
  <script src="renderer.js"></script>
</body>
</html>
