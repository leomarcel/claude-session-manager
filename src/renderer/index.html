<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Session Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      width: 100%; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: transparent;
      color: #e0e0e0;
      overflow: hidden;
    }

    /* Splash screen — visible before React mounts */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: rgba(18, 18, 22, 0.95);
      backdrop-filter: blur(40px);
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Claude mascot */
    .splash-logo {
      position: relative;
      width: 80px;
      height: 80px;
      animation: splash-float 2.5s ease-in-out infinite;
    }
    .splash-logo svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 24px rgba(217, 119, 87, 0.35));
    }

    @keyframes splash-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* Spinner ring */
    .splash-spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(255, 255, 255, 0.08);
      border-top-color: #D97757;
      border-radius: 50%;
      animation: splash-spin 0.9s linear infinite;
    }
    @keyframes splash-spin {
      to { transform: rotate(360deg); }
    }

    .splash-title {
      font-size: 15px;
      font-weight: 600;
      color: rgba(240, 240, 245, 0.85);
      letter-spacing: 0.3px;
    }
    .splash-subtitle {
      font-size: 11px;
      color: rgba(160, 160, 176, 0.6);
      margin-top: -14px;
    }
  </style>
</head>
<body>
  <!-- Splash screen (pure HTML, no JS dependency) -->
  <div id="splash">
    <div class="splash-logo">
      <img src="assets/mascotte_claude.png" alt="Claude" width="80" height="80" />
    </div>
    <span class="splash-title">Claude Session Manager</span>
    <span class="splash-subtitle">Loading sessions...</span>
    <div class="splash-spinner"></div>
  </div>

  <div id="root"></div>
  <script src="renderer.js"></script>
</body>
</html>
